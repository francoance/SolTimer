name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore SolTimer/SolTimer.csproj -r win-x64

    - name: Build
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        dotnet build --configuration Release --no-restore /p:Version=$version /p:RuntimeIdentifier=win-x64
      
    - name: Publish
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        dotnet publish --configuration Release --no-restore --self-contained false /p:PublishSingleFile=true -r win-x64 /p:Version=$version
      
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./SolTimer/bin/Release/net10.0-windows/win-x64/publish/SolTimer.exe
        asset_name: SolTimer.exe
        asset_content_type: application/x-msdownload 